{{- if ne .Values.deploymentMode "monolith" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dorfgefluester.apiName" . }}
  labels:
    {{- include "dorfgefluester.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "dorfgefluester.apiSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.containerPort }}
{{- end }}
